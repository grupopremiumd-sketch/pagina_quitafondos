    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #1a0000 0%, #050505 100%); }
        .tool-view { display: none; height: calc(100vh - 65px); width: 100%; }
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        @media (min-width: 1025px) { .tool-view { display: flex; flex-direction: row; } .viewport { flex-grow: 1; height: 100%; } .sidebar { width: 350px; border-left: 2px solid #222; } }
        @media (max-width: 1024px) { .tool-view { display: flex; flex-direction: column; } .sidebar { width: 100%; height: 450px; border-top: 2px solid #dc2626; overflow-y: auto; padding-bottom: 80px; } }
        .active-view { display: flex !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; }
        #zoom-container { transform-origin: center center; position: absolute; pointer-events: none; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        #selection-box { position: absolute; border: 1.5px solid #fff; display: none; pointer-events: none; z-index: 9999; background: rgba(100, 100, 100, 0.4); }
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; }
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; color: white; border: none; cursor: pointer; }
        .btn-renew { background: #f97316 !important; color: #fff !important; box-shadow: 0 0 20px rgba(249, 115, 22, 0.4); }
        #loading-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #dc2626; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay"><div class="spinner"></div><p class="font-black italic text-red-500 uppercase text-sm mt-4">Consultando Base de Datos...</p></div>

    <div id="auth-screen">
        <div class="max-w-md w-full bg-zinc-900 p-8 rounded-[2rem] border border-red-600/30 text-center shadow-2xl text-white">
            <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center font-black text-3xl mx-auto mb-6 shadow-xl">J&J</div>
            <h2 class="text-2xl font-black italic uppercase mb-2">J&J STUDIO VIP</h2>
            <p class="text-zinc-500 text-[10px] mb-8 uppercase font-bold tracking-widest">Verificación en Tiempo Real</p>
            
            <input type="tel" id="user-id" placeholder="Número de celular" class="w-full bg-black border border-zinc-800 rounded-xl p-4 text-center text-xl font-black text-red-500 mb-4 focus:border-red-600 outline-none">
            
            <button id="btn-login" onclick="validateAccess()" class="w-full btn-jj py-4 mb-4">INGRESAR AL STUDIO</button>
            <button onclick="startTrial()" class="w-full bg-zinc-800 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-400 mb-8">Prueba Gratuita (<span id="t-count">2</span>)</button>
            
            <div class="border-t border-zinc-800 pt-6 space-y-3">
                <button class="w-full py-3 bg-blue-600/10 border border-blue-600/30 rounded-xl text-[10px] font-black text-blue-400 uppercase" onclick="window.open('https://t.me/+B50m1g0NBM1mNzU5', '_blank')">📢 GRUPO TELEGRAM</button>
                <button class="w-full py-3 bg-orange-600/10 border border-orange-600/30 rounded-xl text-[10px] font-black text-orange-500 uppercase" onclick="window.open('https://wa.me/51904503246?text=Quiero%20renovar%20mi%20membresia', '_blank')">🔥 RENOVAR SOCIO VIP</button>
            </div>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <header class="h-[65px] px-4 flex justify-between items-center bg-black border-b border-red-900/40 z-[100]">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-black text-lg shadow-lg text-white">J&J</div>
                <h1 id="welcome-name" class="font-black text-xs uppercase italic text-white tracking-tighter">Cargando...</h1>
            </div>
            <button onclick="downloadPNGWith300DPI()" class="bg-yellow-500 text-black font-black text-[10px] px-4 py-2 rounded shadow-lg uppercase italic">📥 DESCARGAR MASTER</button>
        </header>

        <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center py-10 px-6 overflow-y-auto">
            <h2 class="text-5xl md:text-7xl font-black italic mb-10 uppercase text-center text-white tracking-tighter">STUDIO TOOLS</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl">
                <div onclick="initTool('color')" class="bg-black/40 p-10 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all group">
                    <h3 class="font-black uppercase text-xl italic text-white">Master Color</h3>
                    <p class="text-[9px] text-zinc-500 mt-2 uppercase font-black">Selector Gris Precisión</p>
                </div>
                <div onclick="initTool('ia')" class="bg-black/40 p-10 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all group">
                    <h3 class="font-black uppercase text-xl italic text-red-600">Mejorador IA Pro</h3>
                    <p class="text-[9px] text-zinc-500 mt-2 uppercase font-black">Reconstrucción 4K</p>
                </div>
            </div>
        </section>

        <section id="view-tool" class="tool-view">
            <main class="viewport" id="viewport">
                <div id="zoom-container"><canvas id="canvas"></canvas></div>
                <div id="selection-box"></div>
            </main>
            <aside class="sidebar">
                <button onclick="goBack()" class="bg-zinc-900 text-red-500 font-black py-4 rounded-xl text-[10px] uppercase border border-red-900/20 mb-2">← VOLVER AL MENÚ</button>
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-2">
                    <input type="file" id="upload" class="text-[10px] w-full text-zinc-500" accept="image/*"/>
                </div>
                
                <div id="panel-color" class="hidden space-y-4 bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <div class="flex justify-between items-center">
                        <div class="text-center"><p class="text-[8px] font-black mb-1 uppercase">Base</p><div id="color-old" class="w-12 h-12 rounded border border-white/10 bg-zinc-800"></div></div>
                        <span class="text-red-600 font-black text-xl">➜</span>
                        <div class="text-center"><p class="text-[8px] font-black mb-1 uppercase">Nuevo</p><input type="color" id="custom-picker" class="w-12 h-12 bg-transparent border-none p-0 cursor-pointer"></div>
                    </div>
                    <button onclick="applyColor()" class="btn-jj w-full text-[10px]">Cambiar en Zona Gris</button>
                </div>

                <button onclick="hardReset()" class="w-full py-3 bg-zinc-900 text-zinc-500 font-black rounded-xl text-[10px] uppercase mt-auto">Reiniciar Vista</button>
            </aside>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', {willReadFrequently:true});
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload'), selectionBox = document.getElementById('selection-box');
        const loader = document.getElementById('loading-overlay');
        
        let originalImg = null, liveSnapshot = null, initialSnapshot = null; 
        let scale = 1, posX = 0, posY = 0, targetRGB = [255,255,255], isPanning = false, isSelecting = false, startX_PX, startY_PX, startX_View, startY_View, selectArea = null, currentTool = '';
        let isVIP = false;

        // --- SISTEMA DE CONTADOR ---
        let freeCount = parseInt(localStorage.getItem('jj_free_count') || "2");
        document.getElementById('t-count').innerText = freeCount;

        // --- VALIDACIÓN SINCRONIZADA CON TU GOOGLE SCRIPT ---
        async function validateAccess() {
            const u = document.getElementById('user-id').value.toString().replace(/\D/g,'');
            if(!u) return alert("Ingresa un número válido");
            
            const btn = document.getElementById('btn-login');
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                // LLAMADA EXACTA A TU SCRIPT
                const res = await fetch(`https://script.google.com/macros/s/AKfycbzwIHNPwRi4x_oQHIYIvMYRD7HbZD-dkwo7bEdH3Zc9yN4-TwfURjSd1TcgNKPqYJxo/exec?user=${u}`);
                const data = await res.json();
                
                if(data.access === true) { 
                    isVIP = true; 
                    document.getElementById('welcome-name').innerText = `BIENVENIDO, ${data.nombre.toUpperCase()}`;
                    enterApp(); 
                } else {
                    btn.innerText = "🆘 VENCIDO - RENOVAR AQUÍ";
                    btn.classList.add('btn-renew');
                    btn.disabled = false;
                    btn.onclick = () => window.open('https://wa.me/51904503246?text=Quiero%20renovar%20mi%20VIP', '_blank');
                    alert(`Estado: ${data.status}`);
                }
            } catch(e) { 
                alert("Error de conexión con el servidor J&J."); 
                btn.innerText = "REINTENTAR";
                btn.disabled = false;
            }
        }

        function startTrial() { if(freeCount > 0) { isVIP = false; document.getElementById('welcome-name').innerText = "MODO INVITADO"; enterApp(); } else alert("Pruebas agotadas."); }
        function enterApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-content').style.display = 'block'; }
        function goBack() { document.getElementById('view-tool').classList.remove('active-view'); document.getElementById('view-home').style.display = 'flex'; originalImg = null; upload.value = ""; selectionBox.style.display = 'none'; }
        function initTool(t) { currentTool = t; document.getElementById('view-home').style.display = 'none'; document.getElementById('view-tool').classList.add('active-view'); document.getElementById('panel-color').classList.toggle('hidden', t !== 'color'); }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img;
                    liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
                    scale = Math.min((viewport.offsetWidth - 40) / img.width, (viewport.offsetHeight - 40) / img.height, 1);
                    posX = 0; posY = 0; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // --- SELECTOR ZONAS MATRIX ---
        viewport.addEventListener('mousedown', (e) => {
            if (!originalImg) return;
            const rect = canvas.getBoundingClientRect(), vRect = viewport.getBoundingClientRect();
            const tx = (e.clientX - rect.left) / (rect.width / canvas.width);
            const ty = (e.clientY - rect.top) / (rect.height / canvas.height);
            if (e.button === 0) { 
                const p = ctx.getImageData(Math.floor(tx), Math.floor(ty), 1, 1).data;
                targetRGB = [p[0], p[1], p[2]];
                document.getElementById('color-old').style.backgroundColor = `rgb(${p[0]},${p[1]},${p[2]})`;
                if(currentTool === 'color') { isSelecting = true; startX_PX = tx; startY_PX = ty; startX_View = e.clientX - vRect.left; startY_View = e.clientY - vRect.top; }
            }
            isPanning = true; startX_P = e.clientX - posX; startY_P = e.clientY - posY;
        });
        window.addEventListener('mousemove', (e) => {
            if (isPanning && !isSelecting) { posX = e.clientX - startX_P; posY = e.clientY - startY_P; updateTransform(); }
            if (isSelecting) {
                const vRect = viewport.getBoundingClientRect();
                const curVX = e.clientX - vRect.left, curVY = e.clientY - vRect.top;
                selectionBox.style.display = 'block';
                selectionBox.style.left = Math.min(startX_View, curVX) + 'px';
                selectionBox.style.top = Math.min(startY_View, curVY) + 'px';
                selectionBox.style.width = Math.abs(curVX - startX_View) + 'px';
                selectionBox.style.height = Math.abs(curVY - startY_View) + 'px';
                const rect = canvas.getBoundingClientRect();
                const endX_PX = (e.clientX - rect.left) / (rect.width / canvas.width), endY_PX = (e.clientY - rect.top) / (rect.height / canvas.height);
                selectArea = { x: Math.min(startX_PX, endX_PX), y: Math.min(startY_PX, endY_PX), w: Math.abs(endX_PX - startX_PX), h: Math.abs(endY_PX - startY_PX) };
            }
        });
        window.addEventListener('mouseup', () => { isSelecting = isPanning = false; });

        function applyColor() {
            if(!originalImg) return;
            const area = selectArea || {x:0, y:0, w:canvas.width, h:canvas.height};
            const id = ctx.getImageData(area.x, area.y, area.w, area.h);
            const d = id.data, hex = document.getElementById('custom-picker').value, rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16);
            for(let i=0; i<d.length; i+=4) {
                const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                if(diff < 80) { d[i]=rN; d[i+1]=gN; d[i+2]=bN; }
            }
            ctx.putImageData(id, area.x, area.y);
            selectionBox.style.display='none'; selectArea = null;
        }

        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        function setBg(c) { document.getElementById('viewport').style.backgroundColor = c; }
        function hardReset() { if(originalImg) { ctx.drawImage(originalImg, 0, 0); posX = 0; posY = 0; updateTransform(); } }
        
        async function downloadPNGWith300DPI() {
            if (!originalImg) return;
            if(!isVIP) { freeCount--; localStorage.setItem('jj_free_count', freeCount); }
            const link = document.createElement('a'); link.download = 'JJ_MASTER.png'; link.href = canvas.toDataURL('image/png'); link.click();
            if(!isVIP && freeCount === 0) location.reload();
        }
        function toggleAccordion(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    </script>
</body>
</html>
